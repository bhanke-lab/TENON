#v0.10.1 - Add FAS STAIN ["?"] auto_activate at ROK [4/4] (ROK fixture evidence; 1 data point).
#          Closes rok_2026-05-07 to 21/21.
#  v0.10 - Add FAS OPT to grade_map.PR (BIRCH/ASH/TUL evidence; 6 data points).
#          Add FAS9050 OPT + FASR OPT to grade_map.PR (CHERRY-only catalog; 5 data points).
#          Add "?" to 3ACOM auto_activate colors (CHERRY-isolated; closes 2 cherry missings).
#          Add 3B OPT ["?"] auto_activate at [4/4, 5/4] ANY (SMA/BIRCH/CHERRY/TUL evidence; 4 data points).
#          Idempotent at HMW (catalog has 3B OPT × HMW × 4/4 × ?, AK has it, current rules already predict it).
# v0.9.1 - Remove dead FAS OPT [Unsel] HMW [4/4, 6/4] auto_activate block.
#          Catalog has zero FAS OPT × HMW products at any thickness, so the
#          rule was firing against an empty catalog intersection and
#          activating nothing. The 2 phantom catalog entries that v0.9
#          depended on (instanceIds 99000000000000001/2) were operator-added
#          by mistake at the live UI on Mon 5/4 PM and deactivated 5/6 AM.
#          Companion catalog refresh: dropped 5/4 XML + repointed every
#          fixture's catalog.txt to allproducts_2026-05-06.xml.
#   v0.9 - RETRACTED. Catalog patch + auto_activate were both based on a
#          misread of operator-transient UI state, not a real catalog gap.
#   v0.8 - Move FASS OPT + SEL SAP OPT out of grade_map.PR into auto_activate@8/4
#          for SMA + HMW (was overshooting at 4/4 + 6/4 HMW).
#          3ACOM auto-activation per thickness × species (catalog-intersected).
#          Multi-destination color union for PR / 1C / 2C.
#          FASB OPT [Unsel] auto_activate scoped to HMW [8/4, 10/4, 12/4, 16/4].
#          FAS1W / FAS2W auto-on at 8/4 HMW (catalog-gated).
#   v0.7 - Drop FAS1W / FAS2W / FASB from grade_map.PR (per 8/4 SMA ground truth).
#          Baseline diff harness validated against fixtures/sma_2026-04-27.

grade_map:
  PR:   [SEL OPT, FAS OPT, FAS9050 OPT, FASR OPT]
  SEL:  [SEL OPT, SEL SAP OPT]
  "1C": [1COM OPT, 1COM SAP OPT, 1COMB OPT]
  "2C": [2COM OPT, 2COM SAP OPT]
  "3C": [3ACOM OPT]
  SG:   [SUBG OPT, 3B OPT, 1COMB OPT, WORMY]
  "3B": [3B OPT]
  CHR:  [CHAR OPT, FAS OPT, SEL OPT, 1COM OPT, 2COM OPT]

# Species that never take a grade_map destination even though the base
# grade_map lists it. Applied in match_for_row + multi-destination union.
grade_map_species_exclude:
  PR:
    WALNUT: [SEL OPT]   # PR routes to FAS only; operator never activates SEL OPT (WALNUT-1 + WALNUT-2)

auto_activate:
  - grade: 3ACOM OPT
    colors: [SAP, Unsel, "?"]
    species: ANY
    thicknesses: [4/4, 5/4]
  - grade: 3ACOM OPT          # 8/4 split out so SMA can be excluded from SAP only
    colors: [Unsel, "?"]
    species: ANY
    thicknesses: [8/4]
  - grade: 3ACOM OPT
    colors: [SAP]
    species: ANY
    thicknesses: [8/4]
    exclude_species: [SMA]    # v0.17: 8/4 3ACOM SAP over-fires 4-of-5 SMA runs (SMA-1/3/4/5 off, SMA-6 took it); suppress per the HMW 6/4 3ACOM precedent; SMA-6's 8/4 = operator maybe
  - grade: 3ACOM OPT          # 6/4 split out so TUL / BASSWOOD can be excluded
    colors: [SAP, Unsel, "?"]
    species: ANY
    thicknesses: [6/4]
    exclude_species: [TUL, BASSWOOD, HMW] # +HMW v0.16: 6/4 3ACOM over-fires 3-of-4 HMW (HMW-2/4/5 off, HMW-1 on); suppress to cut false positives, HMW-1 = operator maybe; ROK keeps 6/4 (ROK-4)
  - grade: 2COM OPT
    colors: [Unsel, SAP, "?", 1White]
    species: [ROK]
    thicknesses: ANY

  - grade: WORMY
    colors: ["?"]
    species: [SMA]
    thicknesses: [4/4, 5/4, 6/4, 8/4]

    #     FAS1W / FAS2W HMW 8/4 (operator discretion: active in hmw_2026-05-04,
    #     deselected in hmw_2026-05-18 / hmw_2026-06-01. Kept ON per the ROK
    #     FAS STAIN precedent: prefer over-fire over missing an active product.)    
  - grade: FAS1W OPT
    colors: [1White]
    species: [HMW]
    thicknesses: ["8/4"]
  - grade: FAS2W OPT
    colors: [1White]
    species: [HMW]
    thicknesses: ["8/4"]

  - grade: 3B OPT
    colors: ["?"]
    species: ANY
    thicknesses: ["4/4", "5/4"]

   # SMA PR-SAP family (replaces Fix B's 8/4 SMA block)    
  - grade: FASS OPT
    colors: [SAP]
    species: [SMA]
    thicknesses: ANY              # catalog has FASS @ 4/4, 5/4, 6/4, 8/4, 10/4, 12/4, 16/4
  - grade: SEL SAP OPT
    colors: [SAP]
    species: [SMA]
    thicknesses: ANY              # catalog has SEL SAP @ 4/4, 5/4, 6/4, 8/4

  #  HMW PR-SAP family (replaces Fix B's 8/4 HMW block; 6/4 explicitly skipped)    
  - grade: FASS OPT
    colors: [SAP]
    species: [HMW]
    thicknesses: [4/4, 5/4, 8/4]  # HMW 6/4 FASS = operator maybe (HMW-2/4/5 took, HMW-1 skipped); leave OFF per caution-first, operator adds
  - grade: SEL SAP OPT
    colors: [SAP]
    species: [HMW]
    thicknesses: [4/4, 5/4, 8/4]  # HMW 6/4 deselected per fixture

  - grade: FASB OPT
    colors: [Unsel]
    species: [HMW]
    thicknesses: ["8/4", "10/4", "12/4", "16/4"]
    confidence: provisional

  - grade: FAS STAIN
    colors: ["?"]
    species: [ROK]
    thicknesses: ["4/4"]
  
  # 12/4 FASS OPT SAP ASH (catalog drift, added by Nate 2026-05-13)    
  - grade: FASS OPT
    colors: [SAP]
    species: [ASH]
    thicknesses: ["12/4"]
    confidence: provisional
    # Catalog entry added 2026-05-13 (Nate, pre-confirm).
    # ASH-only scope; do NOT extend to CHERRY without re-confirmation.
    # Remove this block + the catalog entry if reverted.

  # ASH 8/4 commons-Unsel auto_activate (v0.14)    
  - grade: 2COM OPT
    colors: [Unsel]
    species: [ASH]
    thicknesses: ["8/4"]

  # 4/4 commons-Unsel auto_activate
  - grade: 1COM OPT
    colors: [Unsel]
    species: [HMW, SMA]
    thicknesses: ["4/4"]
  - grade: 2COM OPT
    colors: [Unsel]
    species: [HMW, SMA]
    thicknesses: ["4/4"]

color_map:
  UNSEL:    [Unsel, "?", 1White]   # v0.15: dropped SAP (SMA UNSEL->SAP over-fire, SMA-3 + SMA-4). GATE ON check_all.
  SAP+BTR:  [SAP]
  "12W":    [1White]
  W2F:      [1White]
  W1F:      [1White]
  BROWN:    [Unsel, "?"]
  "90/50":  [Unsel, "?"]   # v0.16: cherry 12/4 FAS9050 90/50 CONFIRMED 2-for-2 (cherry 5-20 + 6-18)

width_tokens:
  RandomW:        { min: 0,    max: 99 }
  "Rw SEL":       { min: 4,    max: 99 }
  "Rw RO SEL":    { min: 4,    max: 99 }
  "Rw 4 1/2":     { min: 4.5,  max: 99 }
  "Rw > 4 3/4":   { min: 4.75, max: 99 }
  "Rw 5-8":       { min: 5,    max: 8 }
  "Rw > 5":       { min: 5,    max: 99 }
  "Rw > 5 1/2":   { min: 5.5,  max: 99 }
  "Rw > 6":       { min: 6,    max: 99 }
  "Rw 6-8":       { min: 6,    max: 8 }
  "Rw > 8":       { min: 8,    max: 99 }
  "Rw > 10 1/2":  { min: 10.5, max: 99 }

length_tokens:
  'RandomL +3"':      { min: 7,  max: 16 }
  "Sel 6":            { min: 6,  max: 6 }
  "FAS OPT 6-7'":     { min: 6,  max: 7 }

# Directed deactivations. Post-filter on the predicted set: covers every
# driving path (grade_map, CHR expansion, union, auto_activate). Never
# touches the catalog, so the catalog-gap pre-flight and live_counts
# drift detection are unaffected.
suppress:
  # Directive 2026-07-08 (email, WOK 7-7-26 RSU review; "until we
  # change them in the future"). 4/4 ONLY: 6/4 + 8/4 SEL stay active
  # per the same run's ground truth, and Rw > 5 is the only FAS band at
  # 6/4, 8/4, 10/4, so widening the thickness scope wipes FAS there.
  - grade: SEL OPT          # both bands: RandomW x Sel 6 + Rw SEL
    species: [WOK]
    thicknesses: ["4/4"]
  - grade: FAS OPT          # keep the Rw > 6 sibling
    species: [WOK]
    thicknesses: ["4/4"]
    width_tokens: ["Rw > 5"]
  - grade: CHAR OPT         # keep the Rw > 6 sibling; converts the 5-for-5 over-fire
    species: [WOK]
    thicknesses: ["4/4"]
    width_tokens: ["Rw > 8"]

redirect:
# HMW subgrade redirect (v0.19): 2COM OPT Unsel and 3ACOM OPT Unsel HMW are
# never actually produced - operator always diverts that material to
# subgrade. Real destination is SUBG OPT "?" at the same thickness.
# HMW SUBG OPT only exists in the catalog at 4/4 and 5/4 (no 6/4/8/4 entry),
# so at 8/4 this just removes the source product with no replacement.
  - from_grade: 2COM OPT
    from_colors: [Unsel]
    to_grade: SUBG OPT
    to_color: "?"
    species: [HMW]
  - from_grade: 3ACOM OPT
    from_colors: [Unsel]
    to_grade: SUBG OPT
    to_color: "?"
    species: [HMW]