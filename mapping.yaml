# mapping.yaml
# Translates Run Set Up grade/color codes to Comact catalog grade/color codes.
# All translation rules live here as data, not code.
#
# Version: v0.19 (2026-07-20)
# Stage 1 corpus: 51 fixtures, 10 species. Cumulative 706/59/59 -> recall 92.3% (706/765), precision 92.3% (706/765).
# v0.19 - ROK 2COM OPT promoted to auto_activate (ANY thickness, all catalog colors;
#         operator confirmed 2026-07-20: 2COM is a standing always-active grade for
#         ROK, no color sort). Evidence: rok_2026-06-04 6/4 2COM OPT Unsel
#         MISSING-RULE + operator confirmation.
#         Add redirect: HMW never actually runs 2COM OPT Unsel or 3ACOM OPT Unsel -
#         operator always diverts that material to Sub Grade. New mapping.yaml
#         `redirect` section + match.py apply_redirect() reroutes those predictions
#         to SUBG OPT "?" at the same thickness (pure removal where SUBG OPT doesn't
#         exist in the catalog at that thickness, e.g. HMW 6/4 and 8/4). Operator
#         confirmed 2026-07-20.
#         Known accepted exception: hmw_2026-05-04/05-18/06-01/06-15/06-29 predate
#         this policy and still document 2COM/3ACOM OPT Unsel as active at 4/4 and
#         8/4 (18 MISSING-RULE lines total) - left as-is, not retroactively corrected.
#
# Changelog
# v0.19 - ROK 2COM OPT promoted to auto_activate (ANY thickness, all catalog colors;
#         operator confirmed 2026-07-20: 2COM is a standing always-active grade for
#         ROK, no color sort). Evidence: rok_2026-06-04 6/4 2COM OPT Unsel
#         MISSING-RULE + operator confirmation.
#         Add redirect: HMW never actually runs 2COM OPT Unsel or 3ACOM OPT Unsel -
#         operator always diverts that material to Sub Grade. New mapping.yaml
#         `redirect` section + match.py apply_redirect() reroutes those predictions
#         to SUBG OPT "?" at the same thickness (pure removal where SUBG OPT doesn't
#         exist in the catalog at that thickness, e.g. HMW 6/4 and 8/4). Operator
#         confirmed 2026-07-20.
#         Known accepted exception: hmw_2026-05-04/05-18/06-01/06-15/06-29 predate
#         this policy and still document 2COM/3ACOM OPT Unsel as active at 4/4 and
#         8/4 (18 MISSING-RULE lines total) - left as-is, not retroactively corrected.
# v0.18 - WOK 4/4 directed suppressions (operator directive 2026-07-08, email re:
#         WOK 7-7-26 RSU review, "until we change them in the future"). 4/4 ONLY:
#         suppress SEL OPT, FAS OPT [Rw > 5], CHAR OPT [Rw > 8]; 6/4 + 8/4 + 10/4
#         SEL/FAS/CHAR stay active per that run's ground truth.
# v0.17 - Precision pass (caution-first). 1 edit: split the base 3ACOM auto's
#         [4/4, 5/4, 8/4] into [4/4, 5/4] plus two 8/4 rules; the 8/4 SAP rule
#         excludes SMA. Evidence (answer-key audit 2026-07-06): 8/4 3ACOM OPT SAP
#         predicted-but-off in SMA-1/3/4/5, taken in SMA-6 -> 4-of-5 deselect,
#         clears the HMW 6/4 3ACOM bar. SMA-6's 8/4 3ACOM SAP = operator maybe
#         (26/2/0 -> 25/2/1); cuts 4 extras corpus-wide, zero new false positives.
#         Considered + rejected (same audit):
#         (1) SG->1COMB prune for SMA: 1COMB OPT Unsel ACTIVE in sma_2026-05-11 +
#         sma_2026-05-27 keys -> 2 took / 3 off, below the suppress bar; discretion.
#         (2) 4/4 3ACOM SAP drop for SMA: active 4-of-5, off only SMA-6; keep.
#         (3) ASH/CHERRY PR->SEL excludes: SEL OPT active in ASH-1/2/3 + CHERRY-1/2/3;
#         recent SEL extras are run-to-run discretion, a discretion-layer item.
#         (4) ASH 12/4 FAS OPT Unsel auto: active 3-of-4 (ASH-2 off); rejected per
#         caution-first, same shape as the rejected HMW 6/4 FASS auto.
# v0.16 - Precision pass (caution-first: never auto-select an unwanted product; leave maybes to operator).
#         (1) color_map "90/50" -> [Unsel, "?"]. Closes cherry 12/4 FAS9050 90/50
#         (cherry_2026-05-20 + cherry_2026-06-18); cherry_2026-06-18 13/2/1 -> 14/2/0.
#         (2) Add HMW to the 6/4 3ACOM exclude_species. 6/4 3ACOM SAP over-fires 3-of-4
#         HMW runs (HMW-2/4/5 deselect; hmw_2026-05-04 alone took it). Suppress to cut 3
#         false positives; hmw_2026-05-04's 6/4 3ACOM SAP is now an operator maybe
#         (26/0/0 -> 25/0/1, a missing not an extra). No match.py change.
#         Considered + rejected: extending the HMW FASS [SAP] auto to 6/4. Closes the 6/4
#         FASS miss on HMW-2/4/5 but adds a false positive on hmw_2026-05-04 (skipped 6/4
#         FASS). Recall-chasing that adds a false positive is rejected; 6/4 FASS + SEL SAP
#         stay [4/4, 5/4, 8/4] = operator maybes.
#         Corpus vs v0.15: zero new false positives, -3 extras.
# v0.15 - Precision pass. 
#         (1) grade_map_species_exclude: WALNUT PR never takes
#         SEL OPT (WALNUT-1 + WALNUT-2). 
#         (2) Split 3ACOM auto; exclude TUL +
#         BASSWOOD at 6/4 (TUL-2 + BASS-1 + TUL-3); ROK keeps 6/4 (ROK-4).
#         (3) Drop SAP from color_map.UNSEL (SMA UNSEL->SAP, SMA-3 + SMA-4);
#         real SAP still covered by SAP+BTR rows + FASS/SEL SAP autos. match.py:
#         added grade_map_species_exclude (match_for_row + union) and per-rule
