# mapping.yaml v0.8 — Run Set Up codes → Comact grade/color/auto rules.
# Validated against fixtures: sma_2026-04-27, hmw_2026-05-04.
# All translation rules live here; never bury them in code..

grade_map:
  PR:   [SEL OPT]            # ← was [FAS OPT, FASS OPT, SEL OPT, SEL SAP OPT]
  SEL:  [SEL OPT, SEL SAP OPT]
  "1C": [1COM OPT, 1COM SAP OPT, 1COMB OPT]
  "2C": [2COM OPT, 2COM SAP OPT]
  "3C": [3ACOM OPT]
  SG:   [SUBG OPT, 3B OPT, 1COMB OPT, WORMY OPT, WORMY MARK OPT]
  "3B": [3B OPT]

auto_activate:
  - grade: 3ACOM OPT
    colors: [SAP, Unsel]
    species: ANY
    thicknesses: ANY

  # NEW: FASS OPT + SEL SAP OPT only fire at 8/4, where multi-dest union is real
  - grade: FASS OPT
    colors: [SAP]
    species: [SMA, HMW]
    thicknesses: ["8/4"]
  - grade: SEL SAP OPT
    colors: [SAP]
    species: [SMA, HMW]
    thicknesses: ["8/4"]

  # NEW: Unsel-flavor FAS at thin HMW thicknesses, where SAP+BTR-only PR rows
  # still need a heart-faced bin and FAS OPT Unsel is the only PR catalog entry
  - grade: FAS OPT
    colors: [Unsel]
    species: [HMW]
    thicknesses: ["4/4", "6/4"]

  - grade: FAS1W OPT
    colors: [1White]
    species: [HMW]
    thicknesses: ["8/4"]
  - grade: FAS2W OPT
    colors: [1White]
    species: [HMW]
    thicknesses: ["8/4"]

  - grade: FASB OPT
    colors: [Unsel]
    species: [HMW]
    thicknesses: ["8/4", "10/4", "12/4", "16/4"]
    confidence: provisional

color_map:
  UNSEL:    [Unsel, "?", SAP, 1White]
  SAP+BTR:  [SAP]
  "12W":    [1White]
  W2F:      [1White]
  W1F:      [1White]
  BROWN:    [Unsel, "?"]

width_tokens:
  RandomW:        { min: 0,    max: 99 }
  "Rw SEL":       { min: 4,    max: 99 }
  "Rw RO SEL":    { min: 4,    max: 99 }
  "Rw 4 1/2":     { min: 4.5,  max: 99 }
  "Rw > 4 3/4":   { min: 4.75, max: 99 }
  "Rw 5-8":       { min: 5,    max: 8 }
  "Rw > 5":       { min: 5,    max: 99 }
  "Rw > 5 1/2":   { min: 5.5,  max: 99 }
  "Rw > 6":       { min: 6,    max: 99 }
  "Rw 6-8":       { min: 6,    max: 8 }
  "Rw > 8":       { min: 8,    max: 99 }
  "Rw > 10 1/2":  { min: 10.5, max: 99 }

length_tokens:
  'RandomL +3"':      { min: 7,  max: 16 }
  "Sel 6":            { min: 6,  max: 6 }
  "FAS OPT 6-7'":     { min: 6,  max: 7 }