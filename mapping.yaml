#         Considered + rejected: retracting HMW 8/4 FAS2W/FASB. Active in
#         hmw_2026-05-04 (operator discretion, same as ROK FAS STAIN), so kept
#         ON; the HMW-2/3 over-fires are accepted, not retracted.
# v0.14 - ASH 8/4 commons-Unsel auto_activate
#         Evidence: ash_2026-05-06 8/4 2COM OPT Unsel + ash_2026-05-13 8/4 2COM OPT Unsel.
#         2 cells across 2 fixtures, same species. Operator activates 2COM Unsel
#         at 8/4 ASH even when only a SAP+BTR 2C row drives the bin.
#         Closes 2 missings: ASH-1 to 14/0/1, ASH-2 to 15/0/0 (perfect).
#         Investigated and rejected: 12/4 PR auto-activation. Both ash_2026-05-06
#         and cherry_2026-05-07 have driving 12/4 PR Lumber rows whose color
#         filter (SAP+BTR / "90/50") excludes the catalog's actual PR variant
#         at 12/4; operator activates the catalog product anyway. ASH-1 has
#         FAS OPT Unsel active at 12/4 but ash_2026-05-13's AK does NOT -
#         pattern is operator-add at ASH-1 only, single fixture per species.
#         Held as note, not v0.15 candidate. Re-evaluate on next ASH/CHERRY 12/4 fixture.
# v0.13 - 4/4 commons-Unsel auto_activate
#         Evidence: HMW-1 4/4 1COM Unsel + 2COM Unsel; HMW-2 4/4 1COM Unsel + 2COM Unsel;
#         SMA-2 4/4 1COM Unsel + 2COM Unsel. 6 cells across 2 species at 4/4.
#         Operator auto-activates Unsel commons at 4/4 even when only SAP+BTR rows
#         drive the bin. Catalog-intersection in match.py gates other species.
# v0.12 - Add grade_map.CHR (CHAR/FAS/SEL/1COM/2COM OPT) per WOK fixture
#         evidence: closes WOK 6 missings, introduces 2 catalog-present
#         operator-deselect extras at 4/4 (CHAR OPT ? Rw>8 and FAS OPT
#         Unsel Rw>6). Net WOK: 16/0/6 → 22/2/0. CHR scope intentionally
#         broad to cover all 5 grades; 4/4 deselect noise is documented,
#         same pattern as SMA-1's 8/4 SAP extras. Add 12/4 FASS OPT SAP
#         ASH auto_activate (confidence: provisional) to cover catalog
#         entry added 2026-05-13 by Nate; ASH-only scope (not CHERRY)
#         pending operator re-confirm. WALNUT PR→SEL exclusion deferred
#         to v0.13 (needs grade_map_species_exclude support in match.py);
#         walnut_2026-05-13 stays at 7/2/0 for now.
#         Open question: is 12/4 FASS OPT SAP ASH permanent or
#         experimental? Also evaluating cants→2COM rule (ASH-2 8/4 2COM
#         OPT is operator-add; single-fixture, deferred).
# v0.11 - Revert Fix B's 8/4-only scope; auto_activate FASS OPT [SAP] + SEL SAP OPT [SAP]
#         per species×thickness cell.
#         SMA: all observed thicknesses (catalog-intersected).
#         HMW: [4/4, 5/4, 8/4]; HMW 6/4 explicitly excluded (operator deselects despite
#         catalog presence - confirmed 2026-05-13 against hmw_2026-05-04 AK).
#         Add WORMY ["?"] auto_activate at SMA [4/4, 5/4, 6/4, 8/4]
#         (SMA-2 + SMA-1 evidence; 2 fixtures, 3 thickness cells). 10/4 excluded
#         per 5/11 fixture (catalog has WORMY × SMA × 10/4 but operator deselects).
#         Narrow 3ACOM OPT auto_activate from ANY thickness to [4/4, 5/4, 6/4, 8/4]
