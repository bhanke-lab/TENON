# mapping.yaml
# Translates Run Set Up grade/color codes to Comact catalog grade/color codes.
# All translation rules live here as data, not code.
#
# Version: v0.9 (LOCKED 2026-05-05)
# Stage 1 status: HMW 24/0/1 (recall 96%, precision 100%) · SMA 6/3/1 (recall 86%, precision 67%)
#
# Changelog
#   v0.9 — Add auto_activate FAS OPT [Unsel] at HMW [4/4, 6/4]. Companion to the
#          AllProducts.xml live-patch that added the 2 missing FAS OPT Unsel HMW
#          entries (instanceIds 99000000000000001, 99000000000000002).
#   v0.8 — Move FASS OPT + SEL SAP OPT out of grade_map.PR into auto_activate@8/4
#          for SMA + HMW (was overshooting at 4/4 + 6/4 HMW).
#          3ACOM auto-activation per thickness × species (catalog-intersected).
#          Multi-destination color union for PR / 1C / 2C.
#          FASB OPT [Unsel] auto_activate scoped to HMW [8/4, 10/4, 12/4, 16/4].
#          FAS1W / FAS2W auto-on at 8/4 HMW (catalog-gated).
#   v0.7 — Drop FAS1W / FAS2W / FASB from grade_map.PR (per 8/4 SMA ground truth).
#          Baseline diff harness validated against fixtures/sma_2026-04-27.

grade_map:
  PR:   [SEL OPT]            # ← was [FAS OPT, FASS OPT, SEL OPT, SEL SAP OPT]
  SEL:  [SEL OPT, SEL SAP OPT]
  "1C": [1COM OPT, 1COM SAP OPT, 1COMB OPT]
  "2C": [2COM OPT, 2COM SAP OPT]
  "3C": [3ACOM OPT]
  SG:   [SUBG OPT, 3B OPT, 1COMB OPT, WORMY OPT, WORMY MARK OPT]
  "3B": [3B OPT]

auto_activate:
  - grade: 3ACOM OPT
    colors: [SAP, Unsel]
    species: ANY
    thicknesses: ANY

  # NEW: FASS OPT + SEL SAP OPT only fire at 8/4, where multi-dest union is real
  - grade: FASS OPT
    colors: [SAP]
    species: [SMA, HMW]
    thicknesses: ["8/4"]
  - grade: SEL SAP OPT
    colors: [SAP]
    species: [SMA, HMW]
    thicknesses: ["8/4"]

  # NEW: Unsel-flavor FAS at thin HMW thicknesses, where SAP+BTR-only PR rows
  # still need a heart-faced bin and FAS OPT Unsel is the only PR catalog entry
  - grade: FAS OPT
    colors: [Unsel]
    species: [HMW]
    thicknesses: ["4/4", "6/4"]

  - grade: FAS1W OPT
    colors: [1White]
    species: [HMW]
    thicknesses: ["8/4"]
  - grade: FAS2W OPT
    colors: [1White]
    species: [HMW]
    thicknesses: ["8/4"]

  - grade: FASB OPT
    colors: [Unsel]
    species: [HMW]
    thicknesses: ["8/4", "10/4", "12/4", "16/4"]
    confidence: provisional

color_map:
  UNSEL:    [Unsel, "?", SAP, 1White]
  SAP+BTR:  [SAP]
  "12W":    [1White]
  W2F:      [1White]
  W1F:      [1White]
  BROWN:    [Unsel, "?"]

width_tokens:
  RandomW:        { min: 0,    max: 99 }
  "Rw SEL":       { min: 4,    max: 99 }
  "Rw RO SEL":    { min: 4,    max: 99 }
  "Rw 4 1/2":     { min: 4.5,  max: 99 }
  "Rw > 4 3/4":   { min: 4.75, max: 99 }
  "Rw 5-8":       { min: 5,    max: 8 }
  "Rw > 5":       { min: 5,    max: 99 }
  "Rw > 5 1/2":   { min: 5.5,  max: 99 }
  "Rw > 6":       { min: 6,    max: 99 }
  "Rw 6-8":       { min: 6,    max: 8 }
  "Rw > 8":       { min: 8,    max: 99 }
  "Rw > 10 1/2":  { min: 10.5, max: 99 }

length_tokens:
  'RandomL +3"':      { min: 7,  max: 16 }
  "Sel 6":            { min: 6,  max: 6 }
  "FAS OPT 6-7'":     { min: 6,  max: 7 }